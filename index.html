<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprics Roleplay</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(180deg, #050505, #0b0b0b);

    background-size:
        40px 40px,
        40px 40px,
        100% 100%;

    color: white;
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

/* agrupa logo + badge */
.left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo {
    font-weight: bold;
    font-size: 18px;
}

nav {
    display: flex;
    gap: 25px;
}

nav a {
    color: #ccc;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

nav a:hover {
    color: #fff;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* BADGE (corrigido e único) */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #ffbb001a;
    color: #ffbb00;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
}

/* bolinha */
.ping {
    position: relative;
    width: 8px;
    height: 8px;
    background: #ffbb00;
    border-radius: 50%;
    box-shadow: 0 0 6px #ffbb00;
}

/* animação */
.ping::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #ffbb00;
    animation: ping 1.5s infinite;
    opacity: 0.6;
}

@keyframes ping {
    0% {
        transform: scale(1);
        opacity: 0.6;
    }
    80%, 100% {
        transform: scale(2.5);
        opacity: 0;
    }
}

.title {
    font-size: 70px;
    font-weight: 900;
    line-height: 1.1;
}

.subtitle {
    margin-top: 20px;
    color: #aaa;
    max-width: 600px;
    font-size: 16px;
}

/* BOTÕES */
.buttons {
    margin-top: 30px;
    display: flex;
    gap: 15px;
}

.btn {
    padding: 12px 25px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
}

.btn-primary {
    background: linear-gradient(90deg, #5865F2, #7289da);
    color: white;
}

.btn-primary:hover {
    opacity: 0.8;
}

.btn-outline {
    border: 1px solid #444;
    color: #ccc;
}

.btn-outline:hover {
    border-color: white;
    color: white;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .title {
        font-size: 40px;
    }

    nav {
        display: none;
    }

    header {
        padding: 15px 20px;
    }

    .buttons {
        flex-direction: column;
        width: 100%;
    }

    .btn {
        justify-content: center;
        width: 100%;
    }

    /* esconder badge no mobile */
    .badge {
        display: none;
    }
}

.menu {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}
    </style>
</head>

<body>

<header>
    <h1></h1>
        <!--<div class="badge">
            <span class="ping"></span>
            Em Breve...
        </div> -->
    <div class="menu">
    <nav>
        <a href="#">Início</a>
        <a href="https://discord.gg/32E6k3WYJu">Discord</a>
    </nav>
    </div>
</header>

<section class="hero">
    <div class="title">
        Sprics <br> Roleplay
    </div>
    
      <div class="badge">
    <span class="ping"></span>
    Em Breve...
	</div>


</section>

</body>
</html>
